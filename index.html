<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <!-- HEADER -->

        <div class="header">
            <h1>🌿 Nature Weather Dashboard</h1>
            <p id="datetime"></p>
        </div>

        <!-- SEARCH -->

        <div class="search-box">

            <input
                type="text"
                id="cityInput"
                placeholder="🔍 Search city..."
            >

            <button onclick="getWeather()">
                Search
            </button>

            <button onclick="getLocationWeather()">
                📍 Live Location
            </button>

        </div>

        <!-- MAIN WEATHER CARD -->

        <div class="weather-card">

            <h2 id="city">Loading...</h2>

            <p id="location"></p>

            <img id="icon" alt="Weather Icon">

            <h1 id="temp">--°C</h1>

            <p id="condition">Weather Condition</p>

        </div>

        <!-- WEATHER DETAILS -->

        <div class="info-grid">

            <div class="info-card">
                <h3>💧 Humidity</h3>
                <p id="humidity">--</p>
            </div>

            <div class="info-card">
                <h3>💨 Wind Speed</h3>
                <p id="wind">--</p>
            </div>

            <div class="info-card">
                <h3>🌡 Feels Like</h3>
                <p id="feels">--</p>
            </div>

            <div class="info-card">
                <h3>🌅 Sunrise</h3>
                <p id="sunrise">--</p>
            </div>

            <div class="info-card">
                <h3>🌇 Sunset</h3>
                <p id="sunset">--</p>
            </div>

            <div class="info-card">
                <h3>📍 Coordinates</h3>
                <p id="coordinates">--</p>
            </div>

        </div>

        <!-- FORECAST -->

        <div class="forecast-section">

            <h2>🌤 5-Day Forecast</h2>

            <div id="forecast" class="forecast"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
